<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1584px;
    height: 396px;
    background: #13233f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    position: relative;
    overflow: hidden;
}
/* Subtle gold gradient accents */
.accent-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent 10%, #b8924a 50%, transparent 90%);
}
.accent-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent 10%, #b8924a 50%, transparent 90%);
}
/* Decorative gradient orbs */
.orb-left {
    position: absolute;
    top: -100px;
    left: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(184,146,74,0.08), transparent 70%);
    border-radius: 50%;
}
.orb-right {
    position: absolute;
    bottom: -80px;
    right: -80px;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(184,146,74,0.06), transparent 70%);
    border-radius: 50%;
}
.content {
    text-align: center;
    z-index: 1;
}
.logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
}
.logo-icon {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
}
.logo-icon svg {
    width: 24px;
    height: 24px;
    color: #b8924a;
}
.logo-text h1 {
    font-size: 28px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.02em;
}
.logo-text span {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.5);
}
.gold-line {
    width: 80px;
    height: 2px;
    background: #b8924a;
    margin: 0 auto 24px;
}
.headline {
    font-size: 32px;
    font-weight: 500;
    color: white;
    line-height: 1.3;
    max-width: 900px;
}
.headline em {
    color: #b8924a;
    font-style: normal;
    font-weight: 600;
}
.sub {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    margin-top: 16px;
    font-weight: 400;
}
.url {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-top: 32px;
    letter-spacing: 0.1em;
}
</style>
</head>
<body>
<div class="accent-top"></div>
<div class="accent-bottom"></div>
<div class="orb-left"></div>
<div class="orb-right"></div>

<div class="content">
    <div class="logo-row">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5L12 5l8 6.5"/><path d="M6 10.5V19h4v-4h4v4h4v-8.5"/></svg>
        </div>
        <div class="logo-text">
            <h1>Clarity House</h1>
            <span>Clearly Better Communication</span>
        </div>
    </div>
    <div class="gold-line"></div>
    <p class="headline">Win deals in English. I coach Spanish executives<br>on the delivery <em>AI</em> can't teach.</p>
    <p class="sub">Communication audits · Boardroom presence · International deals</p>
    <p class="url">CLARITYHOUSE.CONSULTING</p>
</div>
</body>
</html>
