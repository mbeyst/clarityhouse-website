<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 400px;
    height: 400px;
    background: #13233f;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}
.icon-wrap {
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.06);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(184,146,74,0.3);
}
.icon-wrap svg {
    width: 80px;
    height: 80px;
    color: #b8924a;
}
.text {
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.text h1 {
    font-size: 28px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.02em;
    line-height: 1.2;
}
.text span {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
    display: block;
}
</style>
</head>
<body>
<div class="container">
    <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11.5L12 5l8 6.5"/>
            <path d="M6 10.5V19h4v-4h4v4h4v-8.5"/>
        </svg>
    </div>
    <div class="text">
        <h1>Clarity House</h1>
        <span>Clearly Better Communication</span>
    </div>
</div>
</body>
</html>
